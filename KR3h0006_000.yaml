body:
  text: 書斷藝術類一書畫之屬提要臣等謹案書斷三卷唐張懷瓘撰是書唐書藝文志著録稱懷瓘於開元中為翰林供奉竇蒙述書賦注則云懷瓘海寧人鄂州司馬與志不同然述書賦張懷瓌條下又注云懷瓌懷瓘弟盛王府司馬兄弟並翰林待詔則與志相合蓋嘗為鄂州司馬終於翰林供奉二書各舉其一官爾所録皆古今書體及能書人名上卷列古文大篆籀文小篆八分𨽻書章草行書飛白草書十體各述其源流繫之以贊末為總論一篇中卷下卷分神妙能三品每品各以體分凡神品二十五人除各體重復得十二人妙品九十八人除各體重復得三十九人能品一百七人除各體重復得三十五人前列姓名後為小傳傳中附録又三十八人其紀述頗詳評論亦允張彥逺法書要録全載其文蓋當代以為精鑒矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:af2eb29edd7d4dbd96c24986cdaec61886dfe5ce432d69a53bb78f27ef5c3fd8
